version: '3.8'

# ═══════════════════════════════════════════════
# 📊 Monitoring Stack — Prometheus + Grafana
# يُشغّل بشكل منفصل عن التطبيق الأساسي
# ═══════════════════════════════════════════════
# Usage: docker-compose -f docker-compose.monitoring.yml up -d
# ═══════════════════════════════════════════════

services:
  # ─── Prometheus ───────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: ahram-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    networks:
      - monitoring

  # ─── Grafana ──────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: ahram-grafana
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana-dashboard.json:/var/lib/grafana/dashboards/ahram-dashboard.json
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=ahram2026
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/ahram-dashboard.json
    restart: unless-stopped
    depends_on:
      - prometheus
    networks:
      - monitoring

volumes:
  prometheus_data:
  grafana_data:

networks:
  monitoring:
    driver: bridge
