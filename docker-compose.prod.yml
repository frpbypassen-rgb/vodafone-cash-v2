version: '3.8'

services:
  ahram_core_prod:
    build: .
    container_name: ahram_core_app_prod
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis_cache:6379
    env_file:
      - .env
    depends_on:
      - mongo_db
      - redis_cache
    volumes:
      - ./uploads:/usr/src/app/uploads
      - ./logs:/usr/src/app/logs

  mongo_db:
    image: mongo:6.0
    container_name: ahram_mongodb_prod
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - ahram_mongo_prod_data:/data/db
    # تفعيل الـ Replica Set للعمليات الذرية والمعاملات
    command: ["--replSet", "rs0", "--bind_ip_all"]

  mongo_rs_init:
    image: mongo:6.0
    container_name: ahram_mongo_rs_init
    depends_on:
      - mongo_db
    # تهيئة الـ Replica Set تلقائياً بمجرد تشغيل قاعدة البيانات
    entrypoint: [ "/bin/bash", "-c", "sleep 5 && mongosh --host mongo_db --eval 'rs.initiate({_id: \"rs0\", members: [{_id: 0, host: \"mongo_db:27017\"}]})' || true" ]

  redis_cache:
    image: redis:7-alpine
    container_name: ahram_redis_prod
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - ahram_redis_prod_data:/data
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"]

volumes:
  ahram_mongo_prod_data:
  ahram_redis_prod_data:
