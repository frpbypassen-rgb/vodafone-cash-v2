name: Deploy to Server

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy main to production server
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      DEPLOY_RESTART_COMMAND: ${{ secrets.DEPLOY_RESTART_COMMAND }}
      DEPLOY_SYSTEMD_SERVICE: ${{ secrets.DEPLOY_SYSTEMD_SERVICE }}
      DEPLOY_SHA: ${{ github.sha }}
      REPO_URL: https://github.com/${{ github.repository }}.git

    steps:
      - name: Check deployment configuration
        id: config
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          for name in DEPLOY_HOST DEPLOY_USER DEPLOY_SSH_KEY DEPLOY_PATH; do
            if [ -z "${!name:-}" ]; then
              echo "::warning::$name secret is not configured"
              missing=1
            fi
          done
          if [ "$missing" -eq 1 ]; then
            echo "Deployment skipped because required server secrets are missing."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare SSH
        if: steps.config.outputs.configured == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$DEPLOY_PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Upload deployment script
        if: steps.config.outputs.configured == 'true'
        shell: bash
        run: |
          set -euo pipefail

          cat > deploy.sh <<'REMOTE_SCRIPT'
          #!/usr/bin/env bash
          set -euo pipefail

          : "${DEPLOY_PATH:?DEPLOY_PATH is required}"
          : "${DEPLOY_SHA:?DEPLOY_SHA is required}"
          : "${REPO_URL:?REPO_URL is required}"

          if [ ! -d "$DEPLOY_PATH/.git" ]; then
            mkdir -p "$(dirname "$DEPLOY_PATH")"
            git clone "$REPO_URL" "$DEPLOY_PATH"
          fi

          cd "$DEPLOY_PATH"
          git fetch origin main
          git checkout main
          git reset --hard "$DEPLOY_SHA"

          npm ci --omit=dev

          if [ -n "${DEPLOY_RESTART_COMMAND:-}" ]; then
            bash -lc "$DEPLOY_RESTART_COMMAND"
          elif [ -f ecosystem.config.js ] && command -v pm2 >/dev/null 2>&1; then
            pm2 reload ecosystem.config.js --env production || pm2 start ecosystem.config.js --env production
            pm2 save
          elif [ -n "${DEPLOY_SYSTEMD_SERVICE:-}" ] && command -v systemctl >/dev/null 2>&1; then
            sudo systemctl restart "$DEPLOY_SYSTEMD_SERVICE"
          else
            echo "No restart method configured. Set DEPLOY_RESTART_COMMAND, DEPLOY_SYSTEMD_SERVICE, or install pm2."
            exit 1
          fi
          REMOTE_SCRIPT

          {
            printf 'export DEPLOY_PATH=%q\n' "$DEPLOY_PATH"
            printf 'export DEPLOY_SHA=%q\n' "$DEPLOY_SHA"
            printf 'export REPO_URL=%q\n' "$REPO_URL"
            printf 'export DEPLOY_RESTART_COMMAND=%q\n' "${DEPLOY_RESTART_COMMAND:-}"
            printf 'export DEPLOY_SYSTEMD_SERVICE=%q\n' "${DEPLOY_SYSTEMD_SERVICE:-}"
          } > deploy.env

          ssh -p "$DEPLOY_PORT" -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" 'mkdir -p /tmp/vodafone-cash-deploy'
          scp -P "$DEPLOY_PORT" -i ~/.ssh/deploy_key deploy.sh deploy.env "$DEPLOY_USER@$DEPLOY_HOST:/tmp/vodafone-cash-deploy/"

      - name: Run deployment
        if: steps.config.outputs.configured == 'true'
        shell: bash
        run: |
          set -euo pipefail
          ssh -p "$DEPLOY_PORT" -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" \
            'cd /tmp/vodafone-cash-deploy && chmod +x deploy.sh && source deploy.env && ./deploy.sh'
