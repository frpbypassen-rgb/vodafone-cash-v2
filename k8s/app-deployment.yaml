apiVersion: apps/v1
kind: Deployment
metadata:
  name: ahram-pay-app
  labels:
    app: ahram-pay
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ahram-pay
  template:
    metadata:
      labels:
        app: ahram-pay
    spec:
      containers:
      - name: ahram-pay
        image: ahram-core-api:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
        env:
        - name: NODE_ENV
          value: "production"
        - name: MONGO_URI
          value: "mongodb://mongo-service:27017/vodafone_cash?replicaSet=rs0"
        - name: PORT
          value: "3000"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: ahram-secrets
              key: jwt-secret
        - name: JWT_REFRESH_SECRET
          valueFrom:
            secretKeyRef:
              name: ahram-secrets
              key: jwt-refresh-secret
        - name: SESSION_SECRET
          valueFrom:
            secretKeyRef:
              name: ahram-secrets
              key: session-secret
        resources:
          limits:
            cpu: "1"
            memory: 1Gi
          requests:
            cpu: 500m
            memory: 512Mi
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 20
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ahram-pay-service
spec:
  selector:
    app: ahram-pay
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3000
  type: ClusterIP
